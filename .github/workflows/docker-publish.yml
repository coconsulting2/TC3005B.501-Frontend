name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'PUBLIC_API_BASE_URL to bake into the image (PUBLIC_* vars are inlined at build time)'
        required: false
        default: 'https://localhost:3000/api'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/coconsulting2/tc3005b-501-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          platforms: linux/amd64
          build-args: |
            PUBLIC_API_BASE_URL=${{ github.event.inputs.api_base_url || 'https://localhost:3000/api' }}
            PUBLIC_IS_DEV=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
